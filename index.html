<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shabakaty - Premium Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-base: #050507;
            --surface: rgba(20, 20, 25, 0.7);
            --neon-cyan: #00f0ff;
            --neon-blue: #0051ff;
            --live-red: #ff003c;
            --text-main: #ffffff;
            --glass-border: rgba(0, 240, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, #11111a 0%, #050507 70%);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- شاشة التحميل الفعلية --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { margin-top: 20px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-cyan); }

        /* --- الهيدر --- */
        header {
            padding: 20px 40px;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-size: 26px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 15px var(--neon-blue); }

        /* --- المشغل الاحترافي المخصص --- */
        .player-wrapper {
            max-width: 1200px; margin: 30px auto;
            position: relative; border-radius: 20px; overflow: hidden;
            background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 240, 255, 0.2);
            border: 1px solid var(--glass-border);
        }
        .player-wrapper:hover .custom-controls, .player-wrapper.active .custom-controls {
            opacity: 1; transform: translateY(0);
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
        
        /* واجهة معلومات القناة العلوية */
        .player-header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transition: opacity 0.3s; z-index: 10; pointer-events: none;
        }
        .player-wrapper:hover .player-header { opacity: 1; }
        .playing-channel-name { font-size: 20px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .live-badge {
            display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 14px;
            background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,0,60,0.3);
        }
        .live-dot { width: 10px; height: 10px; background: var(--live-red); border-radius: 50%; box-shadow: 0 0 10px var(--live-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.95); opacity: 1; } }

        /* شريط التحكم السفلي */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 20px; display: flex; align-items: center; gap: 20px;
            opacity: 0; transform: translateY(10px); transition: all 0.3s ease; z-index: 10;
        }
        .control-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .control-btn:hover { color: var(--neon-cyan); transform: scale(1.1); text-shadow: 0 0 10px var(--neon-cyan); }
        .control-btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        /* قائمة الجودة */
        .quality-container { position: relative; margin-right: auto; }
        .quality-btn { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .quality-menu {
            position: absolute; bottom: 40px; right: 0;
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 10px;
            display: none; flex-direction: column; overflow: hidden; min-width: 100px;
        }
        .quality-menu.show { display: flex; }
        .quality-menu button {
            background: none; border: none; color: #fff; padding: 12px; cursor: pointer; transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 700;
        }
        .quality-menu button:hover, .quality-menu button.active { background: rgba(0, 240, 255, 0.15); color: var(--neon-cyan); }

        /* --- شبكة القنوات --- */
        .channels-section { max-width: 1400px; margin: 0 auto 50px; padding: 0 20px; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .channel-card {
            background: var(--surface); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 25px 20px; cursor: pointer; text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; overflow: hidden;
        }
        .channel-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent); transition: 0.5s;
        }
        .channel-card:hover { transform: translateY(-8px); border-color: var(--neon-cyan); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15); }
        .channel-card:hover::after { left: 100%; }
        .ch-name { font-size: 18px; font-weight: 700; position: relative; z-index: 2; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="spinner"></div>
        <div class="loader-text">تهيئة النظام...</div>
    </div>

    <header>
        <div class="brand">SHABAKATY</div>
    </header>

    <div class="player-wrapper" id="player-container">
        <div class="player-header">
            <div class="playing-channel-name" id="current-channel">اختر قناة للبدء</div>
            <div class="live-badge">
                <div class="live-dot"></div> مباشر
            </div>
        </div>

        <video id="video-player" preload="auto"></video>

        <div class="custom-controls" id="custom-controls">
            <button class="control-btn" id="play-pause-btn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="control-btn" id="mute-btn">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            
            <div class="quality-container">
                <button class="control-btn quality-btn" id="quality-toggle">AUTO <svg width="16" height="16" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></button>
                <div class="quality-menu" id="quality-menu">
                    </div>
            </div>

            <button class="control-btn" id="fullscreen-btn">
                <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
        </div>
    </div>

    <div class="channels-section">
        <div class="channels-grid" id="channels-grid"></div>
    </div>

    <script>
        const API_PROXY_URL = 'api.php'; // مسار ملف الـ PHP الذي قمت بإنشائه
        const STREAM_BASE = 'http://marveltv.info:80/live/856107999101/576199010991/';

        const video = document.getElementById('video-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const muteBtn = document.getElementById('mute-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const qualityToggle = document.getElementById('quality-toggle');
        const qualityMenu = document.getElementById('quality-menu');
        const currentChannelText = document.getElementById('current-channel');
        const playerContainer = document.getElementById('player-container');
        
        let hls = null;
        let controlsTimeout;

        // تهيئة النظام
        async function initApp() {
            try {
                const response = await fetch(API_PROXY_URL);
                const data = await response.json();
                
                // إخفاء شاشة التحميل بسلاسة
                document.getElementById('loader-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 500);

                if(data.error) throw new Error(data.error);

                const beinChannels = data.filter(c => c.name && c.name.toLowerCase().includes('bein'));
                renderChannels(beinChannels);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('channels-grid').innerHTML = `<div style="color:var(--live-red); text-align:center; grid-column: 1/-1; padding: 40px;">فشل الاتصال بملف api.php. تأكد من رفعه على الاستضافة.</div>`;
                document.getElementById('loader-screen').style.display = 'none';
            }
        }

        // عرض القنوات
        function renderChannels(channels) {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            channels.forEach(channel => {
                const cleanName = channel.name.replace(/4K|FHD|HD|SD|MINI/gi, '').trim();
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<div class="ch-name">${cleanName}</div>`;
                card.onclick = () => playChannel(channel.stream_id, cleanName);
                grid.appendChild(card);
            });
        }

        // تشغيل القناة
        function playChannel(streamId, name) {
            const streamUrl = `${STREAM_BASE}${streamId}.m3u8`;
            currentChannelText.innerText = name;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    startLevel: -1 // Auto
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    video.play();
                    updatePlayPauseIcon();
                    setupQualityMenu(data.levels);
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); updatePlayPauseIcon(); });
            }
        }

        // إعداد قائمة الجودة (تعتمد على وجود عدة جودات داخل الرابط إن وجدت)
        function setupQualityMenu(levels) {
            qualityMenu.innerHTML = `<button class="active" data-level="-1">AUTO</button>`;
            if(levels.length > 1) {
                levels.forEach((level, index) => {
                    qualityMenu.innerHTML += `<button data-level="${index}">${level.height}p</button>`;
                });
            }
            
            qualityMenu.querySelectorAll('button').forEach(btn => {
                btn.onclick = (e) => {
                    const level = parseInt(e.target.getAttribute('data-level'));
                    hls.currentLevel = level;
                    
                    qualityMenu.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    qualityToggle.innerHTML = `${e.target.innerText} <svg width="16" height="16" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>`;
                    qualityMenu.classList.remove('show');
                };
            });
        }

        // ---- برمجة أزرار التحكم ----
        
        playPauseBtn.onclick = () => {
            if (video.paused) video.play();
            else video.pause();
            updatePlayPauseIcon();
        };

        function updatePlayPauseIcon() {
            playPauseBtn.innerHTML = video.paused 
                ? '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' // Play
                : '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; // Pause
        }

        muteBtn.onclick = () => {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted
                ? '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
        };

        fullscreenBtn.onclick = () => {
            if (!document.fullscreenElement) {
                playerContainer.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        };

        qualityToggle.onclick = () => qualityMenu.classList.toggle('show');

        // إخفاء الأدوات عند عدم تحريك الماوس (لتجربة ملء الشاشة الخالصة)
        playerContainer.addEventListener('mousemove', () => {
            playerContainer.classList.add('active');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if(!video.paused) playerContainer.classList.remove('active');
            }, 3000);
        });

        playerContainer.addEventListener('mouseleave', () => playerContainer.classList.remove('active'));

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
