<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة العشرين - طيبة خالد</title>
    <style>
        /* استيراد خطوط عصرية جداً */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap');

        :root {
            --bg-deep: #050505;
            --gold-neon: #ffdf00;
            --rose-neon: #ff4e88;
            --purple-neon: #9d4edd;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 223, 0, 0.15);
            --text-light: #f4f4f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
            perspective: 1000px;
        }

        /* شبكة الجزيئات (Canvas) */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ----- شاشة البداية (الغموض) ----- */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-deep) 70%);
            transition: opacity 1.5s cubic-bezier(0.77, 0, 0.175, 1), visibility 1.5s;
        }

        .portal-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--gold-neon);
            color: var(--gold-neon);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 223, 0, 0.2), inset 0 0 20px rgba(255, 223, 0, 0.1);
            animation: pulsePortal 2s infinite alternate;
            transition: all 0.3s ease;
        }

        .portal-btn::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            border-radius: 50%;
            border: 1px dashed var(--rose-neon);
            animation: rotateDash 10s linear infinite;
            opacity: 0.5;
        }

        .portal-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 50px rgba(255, 223, 0, 0.8), inset 0 0 40px rgba(255, 223, 0, 0.5);
        }

        .intro-text {
            margin-top: 40px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            animation: fadeInOut 3s infinite;
        }

        @keyframes pulsePortal {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 223, 0, 0.2); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 223, 0, 0.6); }
        }

        @keyframes rotateDash {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ----- المشهد الرئيسي (بعد الدخول) ----- */
        .main-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transform: scale(1.2);
            transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .main-stage.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* رقم 20 العملاق في الخلفية */
        .giant-20 {
            position: absolute;
            font-family: 'Syncopate', sans-serif;
            font-size: 50vw;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.05);
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
        }

        /* البطاقة الزجاجية ثلاثية الأبعاد */
        .cyber-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            border-left: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 20;
            box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 transparent;
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }

        /* لمعة مرور على البطاقة */
        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            animation: shineCard 6s infinite;
        }

        @keyframes shineCard {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* النصوص داخل البطاقة */
        .title-name {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to left, var(--gold-neon), #fff, var(--rose-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(50px); /* 3D Effect */
            filter: drop-shadow(0 0 15px rgba(255, 223, 0, 0.4));
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--purple-neon);
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 3px;
            transform: translateZ(30px);
        }

        .message-box {
            font-size: 1.15rem;
            line-height: 2;
            font-weight: 500;
            color: #d1d1d5;
            min-height: 150px;
            transform: translateZ(20px);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* كعكة نيون (تجريدية ومودرن) بدل الكلاسيكية */
        .neon-cake {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            transform: translateZ(40px);
        }

        .cake-tier {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid var(--gold-neon);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 223, 0, 0.3), inset 0 0 10px rgba(255, 223, 0, 0.2);
        }

        .tier-1 { width: 80px; height: 30px; bottom: 0; border-color: var(--gold-neon); }
        .tier-2 { width: 55px; height: 25px; bottom: 30px; border-color: var(--rose-neon); box-shadow: 0 0 15px rgba(255, 78, 136, 0.3); }
        
        .sparkle-candle {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 25px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px #fff;
        }

        .spark {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background: var(--gold-neon);
            border-radius: 50%;
            filter: blur(2px);
            animation: sparkFlicker 0.1s infinite alternate;
        }

        @keyframes sparkFlicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; box-shadow: 0 0 20px var(--gold-neon); }
            100% { transform: translateX(-50%) scale(1.5); opacity: 1; box-shadow: 0 0 40px var(--rose-neon), 0 0 60px #fff; }
        }

        /* أزرار التحكم */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 50;
            opacity: 0;
            transition: opacity 2s 3s; /* تظهر متأخرة */
        }

        .controls.show {
            opacity: 1;
        }

        .modern-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modern-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--gold-neon);
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.3);
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <!-- موسيقى هادئة وعصرية تناسب الفخامة -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=ambient-piano-amp-strings-10711.mp3" type="audio/mpeg">
    </audio>

    <canvas id="particleCanvas"></canvas>

    <!-- شاشة الغموض والتشويق -->
    <div class="intro-screen" id="introScreen">
        <button class="portal-btn" id="enterBtn">20</button>
        <div class="intro-text">المسي لاكتشاف الزمن</div>
    </div>

    <!-- المشهد الفاخر -->
    <div class="main-stage" id="mainStage">
        <div class="giant-20">20</div>
        
        <div class="cyber-card" id="card3D">
            <div class="neon-cake">
                <div class="cake-tier tier-1"></div>
                <div class="cake-tier tier-2"></div>
                <div class="sparkle-candle">
                    <div class="spark"></div>
                </div>
            </div>

            <h1 class="title-name">طيبة خالد</h1>
            <div class="subtitle">مرحباً بكِ في العشرينيات</div>
            
            <div class="message-box" id="typedMessage"></div>
        </div>
    </div>

    <div class="controls" id="controls">
        <button class="modern-btn" id="musicBtn">
            <span>🎵</span> تشغيل الموسيقى
        </button>
        <button class="modern-btn" id="effectBtn" style="border-color: var(--rose-neon);">
            <span>✨</span> نثر النجوم
        </button>
    </div>

    <script>
        // --- 1. نظام الجزيئات الذكية (Constellation / Particles) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });
        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = color || (Math.random() > 0.5 ? '#ffdf00' : '#ff4e88');
                this.vx = Math.random() * 1 - 0.5;
                this.vy = Math.random() * 1 - 0.5;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                // الحركة العشوائية البطيئة
                this.x += this.vx;
                this.y += this.vy;

                if(this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                if(this.y < 0 || this.y > canvas.height) this.vy = -this.vy;

                // التفاعل مع الماوس/اللمس
                if(mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;

                    if (distance < mouse.radius) {
                        this.x -= directionX;
                        this.y -= directionY;
                    }
                }
                
                ctx.fillStyle = this.color;
                this.draw();
            }
        }

        function initParticles(count = 120) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let distance = ((particles[a].x - particles[b].x) * (particles[a].x - particles[b].x))
                                 + ((particles[a].y - particles[b].y) * (particles[a].y - particles[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(255, 223, 0, ${opacityValue * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            connectParticles();
            requestAnimationFrame(animateCanvas);
        }

        initParticles(window.innerWidth < 768 ? 60 : 120); // تقليل العدد في الهواتف للأداء
        animateCanvas();

        // --- 2. تفاعل الانتقال (الانفجار والدخول للمشهد) ---
        const enterBtn = document.getElementById('enterBtn');
        const introScreen = document.getElementById('introScreen');
        const mainStage = document.getElementById('mainStage');
        const controls = document.getElementById('controls');
        let stageActive = false;

        function explosionEffect(x, y) {
            for(let i=0; i<80; i++) {
                particles.push(new Particle(x, y, '#fff'));
            }
            setTimeout(() => {
                // إزالة الجزيئات الزائدة تدريجياً ليعود العدد طبيعياً
                if(particles.length > 150) particles.splice(150);
            }, 3000);
        }

        enterBtn.addEventListener('click', (e) => {
            const rect = enterBtn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            explosionEffect(x, y);
            
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                mainStage.classList.add('active');
                controls.classList.add('show');
                stageActive = true;
                startTyping();
            }, 1000);
        });

        // --- 3. تأثير الـ 3D Tilt للبطاقة (حركة بالماوس والهاتف) ---
        const card = document.getElementById('card3D');
        
        document.addEventListener('mousemove', (e) => {
            if(!stageActive) return;
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // إعادة البطاقة لمكانها عند خروج الماوس
        document.addEventListener('mouseleave', () => {
            if(!stageActive) return;
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = 'all 0.5s ease';
        });
        document.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });

        // دعم الهواتف (الجيروسكوب) إن أمكن
        window.addEventListener('deviceorientation', (e) => {
            if(!stageActive) return;
            let xAxis = (e.gamma) / 3; // يمين ويسار
            let yAxis = (e.beta - 45) / 3; // فوق وتحت
            // وضع حدود للحركة
            xAxis = Math.max(-15, Math.min(15, xAxis));
            yAxis = Math.max(-15, Math.min(15, yAxis));
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        // --- 4. كتابة الرسالة الفاخرة ---
        const textToType = `اليوم تكتمل لوحة العشرين عاماً 🎨\n\nأنتِ لستِ مجرد سنة تكبرين، بل مجرة تزداد إشراقاً وتألقاً. عشرون عاماً من الجمال والنجاح.\n\nأتمنى لكِ عقداً جديداً مليئاً باللحظات الاستثنائية التي تليق بكِ. كل عام وأنتِ النجمة التي تضيء كل ما حولها ✨`;
        const typedMessage = document.getElementById('typedMessage');
        let i = 0;

        function startTyping() {
            if (i < textToType.length) {
                if (textToType.charAt(i) === '\n') {
                    typedMessage.innerHTML += '<br>';
                } else {
                    typedMessage.innerHTML += textToType.charAt(i);
                }
                i++;
                setTimeout(startTyping, 40); // سرعة الكتابة
            }
        }

        // --- 5. أزرار التحكم بالموسيقى والمؤثرات ---
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const effectBtn = document.getElementById('effectBtn');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.innerHTML = '<span>🎵</span> تشغيل الموسيقى';
            } else {
                bgMusic.play();
                musicBtn.innerHTML = '<span>🔇</span> إيقاف الموسيقى';
            }
            isPlaying = !isPlaying;
        });

        effectBtn.addEventListener('click', () => {
            // نثر جزيئات إضافية عشوائية
            explosionEffect(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
            
            // وميض رقم 20
            const giant20 = document.querySelector('.giant-20');
            giant20.style.webkitTextStroke = '4px var(--rose-neon)';
            giant20.style.color = 'rgba(255, 223, 0, 0.1)';
            setTimeout(() => {
                giant20.style.webkitTextStroke = '2px rgba(255, 255, 255, 0.05)';
                giant20.style.color = 'transparent';
            }, 500);
        });

    </script>
</body>
</html>
