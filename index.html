<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ميلاد سعيد ملاك - 15</title>
    <style>
        /* استيراد خطوط راقية وناعمة */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --bg-dark: #0f0c29;
            --bg-mid: #302b63;
            --bg-light: #24243e;
            --accent-gold: #ffd700;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff0844;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid), var(--bg-light));
            background-size: 300% 300%;
            animation: auroraBG 15s ease infinite;
            color: var(--text-main);
        }

        @keyframes auroraBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شبكة اليراعات المضيئة (Canvas) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- شاشة الدخول السحرية --- */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: radial-gradient(circle at center, rgba(15,12,41,0.8) 0%, rgba(15,12,41,1) 100%);
            backdrop-filter: blur(10px);
            transition: opacity 1.5s ease, visibility 1.5s;
        }

        .magic-orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--accent-cyan));
            box-shadow: 0 0 40px var(--accent-cyan), 0 0 80px rgba(0, 242, 254, 0.5), inset 0 0 20px #fff;
            cursor: pointer;
            animation: floatOrb 3s ease-in-out infinite, pulseOrb 2s alternate infinite;
            position: relative;
        }

        .magic-orb::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            animation: spin 10s linear infinite;
        }

        .intro-text {
            margin-top: 40px;
            font-size: 1.5rem;
            color: #e0e0e0;
            letter-spacing: 1px;
            font-weight: 300;
            animation: fadeInOut 3s infinite;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulseOrb {
            0% { box-shadow: 0 0 20px var(--accent-cyan); }
            100% { box-shadow: 0 0 60px var(--accent-cyan), 0 0 100px #fff; }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- المشهد الرئيسي --- */
        .main-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transform: translateY(50px);
            transition: all 2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .main-stage.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* رقم 15 المائي/الزجاجي في الخلفية */
        .watermark-15 {
            position: absolute;
            font-family: 'Amiri', serif;
            font-size: 60vh;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* البطاقة الزجاجية السحرية */
        .magic-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* لمسة مضيئة علوية */
        .magic-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        /* تاج الأميرات باستخدام CSS */
        .crown {
            position: relative;
            width: 60px;
            height: 40px;
            margin: 0 auto 20px;
            background: var(--accent-gold);
            clip-path: polygon(0 100%, 100% 100%, 90% 0, 70% 60%, 50% 0, 30% 60%, 10% 0);
            filter: drop-shadow(0 5px 10px rgba(255, 215, 0, 0.4));
            animation: floatOrb 4s ease-in-out infinite;
        }

        .crown::after {
            content: '✨';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            animation: fadeInOut 2s infinite;
        }

        /* النصوص */
        .name-title {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .message-box {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f0f0f0;
            min-height: 100px;
            margin-bottom: 20px;
        }

        /* --- صندوق التهنئة بالامتحانات (التصميم الخاص) --- */
        .exam-wish-box {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,8,68,0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 15px 20px;
            margin-top: 20px;
            position: relative;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .exam-wish-box.show {
            opacity: 1;
            transform: scale(1);
            animation: pulseBox 3s infinite alternate;
        }

        @keyframes pulseBox {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
            100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); }
        }

        .exam-wish-box h3 {
            color: var(--accent-gold);
            font-size: 1.3rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .exam-wish-box p {
            font-size: 1.05rem;
            color: #fff;
            line-height: 1.6;
        }

        /* الزر التفاعلي */
        .wish-btn {
            background: linear-gradient(45deg, var(--accent-cyan), #0093e9);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .wish-btn:active {
            transform: scale(0.95);
        }

        /* أدوات التحكم بالموسيقى */
        .music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 50;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 2s;
        }

        .music-control.show { opacity: 1; }

    </style>
</head>
<body>

    <!-- موسيقى سحرية حالمة -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/02/07/audio_67e9970c7e.mp3?filename=magical-fairy-tale-112374.mp3" type="audio/mpeg">
    </audio>

    <!-- كانفاس التأثيرات السحرية -->
    <canvas id="magicCanvas"></canvas>
    <!-- كانفاس تأثير الماوس/اللمس -->
    <canvas id="trailCanvas"></canvas>

    <!-- شاشة الغموض والتشويق -->
    <div class="intro-screen" id="introScreen">
        <div class="magic-orb" id="enterBtn"></div>
        <div class="intro-text">المسي الكرة السحرية</div>
    </div>

    <!-- التحكم بالموسيقى -->
    <div class="music-control" id="musicBtn">🎵</div>

    <!-- المشهد الفاخر -->
    <div class="main-stage" id="mainStage">
        <div class="watermark-15">15</div>
        
        <div class="magic-card">
            <div class="crown"></div>
            
            <h1 class="name-title">ملاك خالد</h1>
            <div class="subtitle">خامسة عشرة من الرقة والجمال ✨</div>
            
            <div class="message-box" id="typedMessage"></div>

            <!-- صندوق الأمنيات بالامتحانات (يظهر ببرمجة بعد النص) -->
            <div class="exam-wish-box" id="examBox">
                <h3>🎓 بطلة الثالث المتوسط 🎓</h3>
                <p>كل التوفيق والنجاح والتفوق في امتحاناتك القادمة. نحن نثق بذكائك وقدراتك.. أنتِ قدها وراح ترفعين راسنا وتفرحينا بأعلى الدرجات! 🌟</p>
            </div>
            
            <button class="wish-btn" id="magicBurstBtn">انثري السحر 🦋</button>
        </div>
    </div>

    <script>
        // --- 1. نظام اليراعات السحرية (Fireflies) ---
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let fireflies = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Firefly {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = Math.random() > 0.5 ? '#00f2fe' : '#ffd700';
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.02 + 0.005;
                this.fadingOut = Math.random() > 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                if (this.fadingOut) {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0.1) this.fadingOut = false;
                } else {
                    this.opacity += this.fadeSpeed;
                    if (this.opacity >= 1) this.fadingOut = true;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function initFireflies() {
            let count = window.innerWidth < 768 ? 50 : 100;
            for (let i = 0; i < count; i++) {
                fireflies.push(new Firefly());
            }
        }

        function animateFireflies() {
            ctx.clearRect(0, 0, width, height);
            fireflies.forEach(f => {
                f.update();
                f.draw();
            });
            requestAnimationFrame(animateFireflies);
        }

        initFireflies();
        animateFireflies();

        // --- 2. نظام ذيل النجوم للماوس واللمس (Magic Trail) ---
        const trailCanvas = document.getElementById('trailCanvas');
        const trailCtx = trailCanvas.getContext('2d');
        let trails = [];

        function resizeTrailCanvas() {
            trailCanvas.width = window.innerWidth;
            trailCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeTrailCanvas);
        resizeTrailCanvas();

        class TrailParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
                this.decay = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }
            draw() {
                trailCtx.beginPath();
                trailCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                trailCtx.fillStyle = `rgba(255, 215, 0, ${this.life})`;
                trailCtx.fill();
            }
        }

        function addTrail(x, y) {
            for (let i = 0; i < 3; i++) {
                trails.push(new TrailParticle(x, y));
            }
        }

        window.addEventListener('mousemove', (e) => addTrail(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => addTrail(e.touches[0].clientX, e.touches[0].clientY));

        function animateTrail() {
            trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            for (let i = trails.length - 1; i >= 0; i--) {
                trails[i].update();
                trails[i].draw();
                if (trails[i].life <= 0) trails.splice(i, 1);
            }
            requestAnimationFrame(animateTrail);
        }
        animateTrail();

        // --- 3. الدخول وكتابة الرسالة ---
        const enterBtn = document.getElementById('enterBtn');
        const introScreen = document.getElementById('introScreen');
        const mainStage = document.getElementById('mainStage');
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const examBox = document.getElementById('examBox');
        
        let isPlaying = false;

        enterBtn.addEventListener('click', () => {
            // تأثير انفجار سحري عند الضغط
            for(let i=0; i<50; i++) {
                const rect = enterBtn.getBoundingClientRect();
                trails.push(new TrailParticle(rect.left + rect.width/2, rect.top + rect.height/2));
            }

            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                mainStage.classList.add('active');
                musicBtn.classList.add('show');
                
                // تشغيل الموسيقى
                bgMusic.play().catch(e => console.log(e));
                isPlaying = true;

                setTimeout(startTyping, 1000);
            }, 1000);
        });

        // تحكم الموسيقى
        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.innerText = '🔇';
            } else {
                bgMusic.play();
                musicBtn.innerText = '🎵';
            }
            isPlaying = !isPlaying;
        });

        // كتابة الرسالة
        const textToType = "كل عام وأنتِ النور الذي يملأ دنيانا 🤍\nعامكِ الخامس عشر هو بداية لأجمل محطات حياتك. أتمنى أن تكون أيامكِ كلها سعادة وتحقيق لكل الأحلام التي تسكن قلبكِ الأبيض.";
        const typedMessage = document.getElementById('typedMessage');
        let charIndex = 0;

        function startTyping() {
            if (charIndex < textToType.length) {
                if (textToType.charAt(charIndex) === '\n') {
                    typedMessage.innerHTML += '<br><br>';
                } else {
                    typedMessage.innerHTML += textToType.charAt(charIndex);
                }
                charIndex++;
                setTimeout(startTyping, 40);
            } else {
                // بعد انتهاء الكتابة، يظهر صندوق التهنئة بالامتحانات
                setTimeout(() => {
                    examBox.classList.add('show');
                }, 500);
            }
        }

        // --- 4. زر التفاعل (نثر السحر) ---
        const magicBurstBtn = document.getElementById('magicBurstBtn');
        
        magicBurstBtn.addEventListener('click', () => {
            // إنشاء انفجار من الجزيئات الملونة
            const rect = magicBurstBtn.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 100; i++) {
                let p = new TrailParticle(startX, startY);
                p.size = Math.random() * 5 + 2;
                p.speedX = (Math.random() - 0.5) * 15;
                p.speedY = (Math.random() - 0.5) * 15;
                p.decay = Math.random() * 0.02 + 0.01;
                trails.push(p);
            }

            // حركة اهتزاز بسيطة للزر
            magicBurstBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                magicBurstBtn.style.transform = 'scale(1)';
            }, 150);
        });

    </script>
</body>
</html>
